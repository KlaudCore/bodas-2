<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agregar al Calendario</title>

<link rel="stylesheet" href="css/calendario.css">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<section class="calendar-page">

    <h1>
        Agrega el evento
        <br>
        a tu calendario
    </h1>

    <div class="heart">♡</div>

    <p class="subtitle">
        No olvides agendar para que
        no te lo pierdas.
    </p>

    <div class="calendar-buttons">

        <a
        class="calendar-card"
        target="_blank"
        href="https://calendar.google.com/calendar/render?action=TEMPLATE">

            <span>📅</span>

            GOOGLE CALENDAR

        </a>

        <a
        class="calendar-card"
        href="evento.ics">

            <span></span>

            APPLE CALENDAR

        </a>

        <a
        class="calendar-card"
        target="_blank"
        href="https://outlook.live.com/calendar/">

            <span>📧</span>

            OUTLOOK CALENDAR

        </a>

        <a
        class="calendar-card"
        href="evento.ics">

            <span>🗓️</span>

            OTRO CALENDARIO

        </a>

    </div>

    <a class="next-btn" href="qr.html">

        CONTINUAR

    </a>

</section>

</body>

</html>
